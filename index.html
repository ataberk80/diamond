<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finans Çözümleri</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            background-color: #11131a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #1c1e2a;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #raporTarihi {
            display: none;
            text-align: center;
            font-size: 12px;
            color: #a0a5b5;
            margin-bottom: 15px;
        }
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-size: 13px;
            margin-bottom: 8px;
            color: #a0a5b5;
        }
        input {
            background-color: #272a38;
            border: 1px solid #363a4d;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #6366f1;
        }
        .result-box {
            background-color: #5b5ce6;
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .result-title {
            font-size: 15px;
            color: #e2e4ff;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 36px;
            font-weight: 700;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        button {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-clear { background-color: #ef4444; }
        .btn-copy { background-color: #10b981; }
        .btn-pdf { background-color: #8b5cf6; }
    </style>
</head>
<body>

    <div class="container" id="appContainer">
        <div id="raporTarihi"></div>
        <div class="title">Finans Çözümleme</div>
        
        <div class="grid">
            <div class="input-group">
                <label>Yatırım (+)</label>
                <input type="number" id="yatirim" placeholder="0">
            </div>
            <div class="input-group">
                <label>Devir (+)</label>
                <input type="number" id="devir" placeholder="0">
            </div>
            <div class="input-group">
                <label>Çekim (-)</label>
                <input type="number" id="cekim" placeholder="0">
            </div>
            <div class="input-group">
                <label>Özel ödeme (-)</label>
                <input type="number" id="ozelOdeme" placeholder="0">
            </div>
            <div class="input-group">
                <label>Yt kom (-)</label>
                <input type="number" id="ytKom" placeholder="0">
            </div>
            <div class="input-group">
                <label>Çek kom (-)</label>
                <input type="number" id="cekKom" placeholder="0">
            </div>
        </div>

        <div class="result-box">
            <div class="result-title">DEVREDEN</div>
            <div class="result-value" id="devreden">₺0.00</div>
        </div>

        <div class="action-buttons" id="actionButtons">
            <button class="btn-clear" onclick="temizle()">🗑️ Temizle</button>
            <button class="btn-copy" id="copyBtn" onclick="kopyala()">📋 Kopyala</button>
            <button class="btn-pdf" onclick="pdfIndir()">📄 PDF İndir</button>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => input.addEventListener('input', hesapla));

        function hesapla(e) {
            let yatirim = parseFloat(document.getElementById('yatirim').value) || 0;
            let cekim = parseFloat(document.getElementById('cekim').value) || 0;
            
            if (e && e.target.id === 'yatirim') {
                const otoYtKom = yatirim * 0.025; 
                document.getElementById('ytKom').value = otoYtKom > 0 ? otoYtKom : '';
            }

            if (e && e.target.id === 'cekim') {
                const otoCekKom = cekim * 0.005; 
                document.getElementById('cekKom').value = otoCekKom > 0 ? otoCekKom : '';
            }

            const devir = parseFloat(document.getElementById('devir').value) || 0;
            const ozelOdeme = parseFloat(document.getElementById('ozelOdeme').value) || 0;
            const ytKom = parseFloat(document.getElementById('ytKom').value) || 0;
            const cekKom = parseFloat(document.getElementById('cekKom').value) || 0;

            const sonuc = (yatirim + devir) - (cekim + ozelOdeme + ytKom + cekKom);
            
            document.getElementById('devreden').innerText = '₺' + sonuc.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Temizleme İşlemi
        function temizle() {
            inputs.forEach(input => input.value = '');
            hesapla();
        }

        // Kopyalama İşlemi
        function kopyala() {
            const yatirim = document.getElementById('yatirim').value || 0;
            const devir = document.getElementById('devir').value || 0;
            const cekim = document.getElementById('cekim').value || 0;
            const ozelOdeme = document.getElementById('ozelOdeme').value || 0;
            const ytKom = document.getElementById('ytKom').value || 0;
            const cekKom = document.getElementById('cekKom').value || 0;
            const devreden = document.getElementById('devreden').innerText;

            const metin = `📊 *Finans Raporu*

➕ Yatırım: ₺${yatirim}
➕ Devir: ₺${devir}
➖ Çekim: ₺${cekim}
➖ Özel Ödeme: ₺${ozelOdeme}
➖ Yt Kom: ₺${ytKom}
➖ Çek Kom: ₺${cekKom}

💵 *DEVREDEN: ${devreden}*`;

            navigator.clipboard.writeText(metin).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ Kopyalandı";
                setTimeout(() => { btn.innerText = "📋 Kopyala"; }, 2000);
            });
        }

        // PDF İndirme İşlemi
        function pdfIndir() {
            const container = document.getElementById('appContainer');
            const tarihDiv = document.getElementById('raporTarihi');
            const butonlar = document.getElementById('actionButtons');

            // Tarihi oluştur
            const simdi = new Date();
            const tarihSaat = simdi.toLocaleDateString('tr-TR') + ' - ' + simdi.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
            
            tarihDiv.innerText = "Rapor Tarihi: " + tarihSaat;
            
            // PDF için görünümü ayarla (butonları gizle, tarihi göster)
            tarihDiv.style.display = "block";
            butonlar.style.display = "none";

            const opt = {
                margin: 0.5,
                filename: 'Finans_Raporu.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#1c1e2a' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // PDF oluştur ve indir, sonra görünümü eski haline getir
            html2pdf().set(opt).from(container).save().then(() => {
                tarihDiv.style.display = "none";
                butonlar.style.display = "flex";
            });
        }
    </script>

</body>
</html>
